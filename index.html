<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Machanic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body>
    <div class="m-10 p-6 bg-gray-100 min-h-screen">
      <header
        class="bg-gradient-to-r from-blue-800 to-blue-600 h-14 sm:h-28 md:h-28 lg:h-28 bg-gray-200 w-full py-4 px-6 sm:py-0 sm:px-0 flex justify-between item-center sm:sticky sm:top-0"
      >
        <!-- MOBILE NAVBAR -->
        <nav
          class="w-full h-full flex justify-between items-center sm:hidden md:hidden lg:hidden xl:hidden"
        >
          <div id="logo_div" class="flex justify-between gap-2 items-center">
            <img
              src="images/alphalogo.png"
              alt="ALPHA_LOGO"
              class="flex justify-center items-center w-10 h-10 rounded-full"
            />
            <h1 class="text-center text-xl text-white font-bold">
              ALPHA MECHANICS
            </h1>
          </div>
          <div class="group">
            <button class="px-4">
              <span class="material-symbols-outlined text-white"> menu </span>
            </button>
            <div
              class="flex flex-col justify-between items-center py-6 hidden bg-blue-600 absolute top-30 right-20 text-white px-6 group-hover:block rounded-md"
            >
              <a href="/" class="p-4 block font-bold  hover:scale-105 origin-left transform transition duration-300">Home</a>
              <a href="about.html" class="p-4 block font-bold  hover:scale-105 origin-left transform transition duration-300">About US</a>
              <a href="service.html" class="p-4 block font-bold  hover:scale-105 origin-left transform transition duration-300">Services</a>
              <a href="contact.html" class="px-4 block font-bold  hover:scale-105 origin-left transform transition duration-300">Contact</a>
            </div>
          </div>
        </nav>
        <!-- BIG NAVBAR -->
        <nav
          class="hidden sm:block md:block lg:block xl:block w-full h-full bg-gradient-to-r from-blue-600 to-blue-900 flex flex-col justify-between items-center gap-6"
        >
          <div
            id="logo_div2"
            class="flex justify-between hidden sm:flex md:flex lg:flex bg-gray-200 h-1/2 px-6 py-2"
          >
            <img
              src="images/alphalogo.png"
              alt="logo_alpha"
              class="h-full w-32  "
            />

            <span class="font-bold text-lg text-gray-800 bg-blue-400/10 px-4 py-2 block rounded-d"
              >+254115191502</span
            >
          </div>
          <!-- navbar itself -->
          <div
            class="flex flex-row justify-between items-center py-6 hidden sm:block md:block lg:block font-semibold text-white h-1/2 px-6"
          >
            <div class="flex justify-between items-center w-1/2 pb-4">
              <a href="/" class="px-4 inlin-block font-bold  hover:scale-105 origin-left transform transition duration-300">Home</a>
              <a href="about.html" class="px-4 inlin-block font-bold  hover:scale-105 origin-left transform transition duration-300">About US</a>
              <a href="service.html" class="px-4 inlin-block font-bold  hover:scale-105 origin-left transform transition duration-300">Services</a>
              <a href="contact.html" class="px-4 inlin-block font-bold  hover:scale-105 origin-left transform transition duration-300">Contact</a>
            </div>
          </div>
        </nav>
      </header>
    </div>
  </body>
</html>
